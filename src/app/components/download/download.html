<section id="download" class="download">
  <div class="container">
    <div class="download-card">
      <div class="download-grid" aria-hidden="true"></div>
      <div class="download-content">
        <div class="eyebrow">Get Schuly</div>
        <h2 class="download-title">Ready when you are.</h2>
        <p class="download-description">
          Available on every platform a student carries. Open source, free, and built in public.
        </p>
        <div class="download-buttons">
          <a href="https://github.com/schulydev/Schuly/releases" target="_blank" rel="noopener" class="download-btn">
            <fa-icon [icon]="faAndroid" class="dl-icon"></fa-icon>
            <div>
              <div class="dl-platform">Android</div>
              <div class="dl-file">Download .apk</div>
            </div>
            <fa-icon [icon]="faArrowRight" class="dl-arrow"></fa-icon>
          </a>
          <a href="https://github.com/schulydev/Schuly/releases" target="_blank" rel="noopener" class="download-btn">
            <fa-icon [icon]="faApple" class="dl-icon"></fa-icon>
            <div>
              <div class="dl-platform">iOS</div>
              <div class="dl-file">Sideload .ipa</div>
            </div>
            <fa-icon [icon]="faArrowRight" class="dl-arrow"></fa-icon>
          </a>
          <a href="https://schuly.dev" class="download-btn">
            <fa-icon [icon]="faGlobe" class="dl-icon"></fa-icon>
            <div>
              <div class="dl-platform">Web</div>
              <div class="dl-file">Coming soon</div>
            </div>
            <fa-icon [icon]="faArrowRight" class="dl-arrow"></fa-icon>
          </a>
        </div>
        <p class="download-note">
          Requires a SchulyBackend instance. See the
          <a href="https://github.com/schulydev/SchulyBackend" target="_blank" rel="noopener">backend repo</a>
          for self-hosting docs.
        </p>
      </div>
    </div>
  </div>
</section>
