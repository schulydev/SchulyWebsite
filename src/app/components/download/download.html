<section id="download" class="download">
  <div class="container">
    <div class="download-content">
      <h2 class="download-title">Ready to Transform Your Student Experience?</h2>
      <p class="download-description">
        Get started with Schuly today. Available for all major platforms.
      </p>
      <div class="download-buttons">
        <a
          href="https://github.com/PianoNic/schuly/releases"
          target="_blank"
          rel="noopener"
          class="download-btn android"
        >
          <fa-icon [icon]="faAndroid" size="2x"></fa-icon>
          <div>
            <div class="download-platform">Android</div>
            <div class="download-file">.apk file</div>
          </div>
        </a>
        <a
          href="https://github.com/PianoNic/schuly/releases"
          target="_blank"
          rel="noopener"
          class="download-btn ios"
        >
          <fa-icon [icon]="faApple" size="2x"></fa-icon>
          <div>
            <div class="download-platform">iOS</div>
            <div class="download-file">.ipa file (sideload)</div>
          </div>
        </a>
      </div>
      <p class="download-note">
        Requires <a href="https://github.com/PianoNic/SchulwareAPI" target="_blank">SchulwareAPI</a>
        backend. See documentation for setup instructions.
      </p>
    </div>
  </div>
</section>
