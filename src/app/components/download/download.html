<section id="download" class="download">
  <div class="container">
    <div class="download-card">
      <div class="download-grid" aria-hidden="true"></div>
      <div class="download-content">
        <div class="eyebrow">Get Schuly</div>
        <h2 class="download-title">Ready when you are.</h2>
        <p class="download-description">
          Available on every platform a student carries. Open source, free, and built in public.
        </p>

        <div class="store-buttons">
          <span
            class="store-badge store-badge--disabled"
            aria-label="App Store - coming soon"
            aria-disabled="true"
          >
            <fa-icon [icon]="faApple" class="store-badge-icon"></fa-icon>
            <span class="store-badge-text">
              <span class="store-badge-pre">Coming soon</span>
              <span class="store-badge-name">App Store</span>
            </span>
          </span>

          <span
            class="store-badge store-badge--disabled"
            aria-label="Google Play - coming soon"
            aria-disabled="true"
          >
            <fa-icon [icon]="faGooglePlay" class="store-badge-icon"></fa-icon>
            <span class="store-badge-text">
              <span class="store-badge-pre">Coming soon</span>
              <span class="store-badge-name">Google Play</span>
            </span>
          </span>
        </div>

        <div class="alt-downloads">
          <a href="https://github.com/schulydev/Schuly/releases" target="_blank" rel="noopener" class="alt-link">
            <fa-icon [icon]="faAndroid"></fa-icon>
            <span>.apk on GitHub</span>
          </a>
          <span class="alt-sep">·</span>
          <a href="https://github.com/schulydev/Schuly/releases" target="_blank" rel="noopener" class="alt-link">
            <fa-icon [icon]="faApple"></fa-icon>
            <span>.ipa on GitHub</span>
          </a>
          <span class="alt-sep">·</span>
          <a href="https://schuly.dev" class="alt-link">
            <fa-icon [icon]="faGlobe"></fa-icon>
            <span>Web (soon)</span>
          </a>
        </div>

        <p class="download-note">
          Requires a SchulyBackend instance. See the
          <a href="https://github.com/schulydev/SchulyBackend" target="_blank" rel="noopener">backend repo</a>
          for self-hosting docs.
        </p>
      </div>
    </div>
  </div>
</section>
