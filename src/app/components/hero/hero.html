<section id="top" class="hero">
  <div class="hero-grid" aria-hidden="true"></div>
  <div class="hero-glow" aria-hidden="true"></div>
  <div class="hero-noise" aria-hidden="true"></div>

  <div class="hero-content">
    <h1 class="hero-title">
      {{ 'hero.title1' | translate }}<br />
      <span class="hero-title-dim">{{ 'hero.title2' | translate }}</span>
    </h1>

    <p class="hero-sub">
      {{ 'hero.sub' | translate }}
    </p>

    <div class="hero-actions">
      <a href="#download" class="btn btn-primary">
        {{ 'hero.ctaDownload' | translate }}
        <fa-icon [icon]="faArrowRight"></fa-icon>
      </a>
      <a href="https://github.com/schulydev/Schuly" target="_blank" rel="noopener" class="btn btn-secondary">
        <fa-icon [icon]="faGithub"></fa-icon>
        {{ 'hero.ctaGithub' | translate }}
      </a>
    </div>
  </div>
</section>
