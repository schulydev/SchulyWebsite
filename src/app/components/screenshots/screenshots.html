<section id="screenshots" class="screenshots">
  <div class="container">
    <div class="section-header">
      <div class="eyebrow">{{ 'screenshots.eyebrow' | translate }}</div>
      <h2 class="section-title">{{ 'screenshots.title' | translate }}</h2>
      <p class="section-description">
        {{ 'screenshots.description' | translate }}
      </p>
    </div>

    <div class="screens" #stage>
      @for (s of shots; track s.src; let i = $index) {
        <div class="screen" [style.--i]="i" [style.--total]="shots.length">
          <picture>
            <source type="image/webp" [srcset]="s.webp" />
            <img [src]="s.src" [alt]="'screenshots.alts.' + s.altKey | translate" loading="lazy" decoding="async" width="800" height="1733" />
          </picture>
        </div>
      }
    </div>
  </div>
</section>
