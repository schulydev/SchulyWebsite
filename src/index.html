  <!-- Structured data: FAQ -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "FAQPage",
    "mainEntity": [
      {
        "@type": "Question",
        "name": "What is Schuly?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Schuly is a free, open-source student portal app. It gives you a modern interface for the school systems your schools already use - grades, schedule, agenda, absences, push notifications - and lets you keep multiple schools in one app. Available for iOS, Android, and Web."
        }
      },
      {
        "@type": "Question",
        "name": "Which school systems does Schuly support?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Currently Schulnetz (via the Schulware plugin) and OdaOrg. Schulnetz is the most widely used integration. Each system is wrapped by a backend plugin, so more can be added without changing the app."
        }
      },
      {
        "@type": "Question",
        "name": "Is Schuly affiliated with Schulnetz or Centerboard AG?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "No. Schuly is an independent open-source project. It is not affiliated with, endorsed by, or sponsored by Centerboard AG or any other school system, company, or institution."
        }
      },
      {
        "@type": "Question",
        "name": "How much does Schuly cost?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Schuly is free. The app, the backend, and the plugin SDK are open source. Source code is on GitHub under github.com/schulydev."
        }
      },
      {
        "@type": "Question",
        "name": "Where is my data stored?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "The backend runs on IONOS in France. Your data stays in the EU/EEA - no third-country transfer. The marketing site is on Cloudflare Pages and processes only your IP for delivery."
        }
      },
      {
        "@type": "Question",
        "name": "Does Schuly know my school password?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Your Schuly account runs on an external OIDC provider (Pocket ID by default; the authority is configurable), so there is no Schuly password. Schulnetz signs in with your school email and password (plus your MFA secret if enabled), which authenticate you and are not stored - only the session tokens are kept. OdaOrg uses a username and password, stored only inside the OdaOrg plugin's isolated database - never read by, or shared with, the rest of the system."
        }
      },
      {
        "@type": "Question",
        "name": "Can my school system be added?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Yes. The backend loads plugins that wrap each school system - an API wrapper if the system has an API, a scraper if it does not. Once a plugin is installed, the school system shows up in the app's Add school flow. Plugins are written against the Schuly plugin SDK on GitHub."
        }
      },
      {
        "@type": "Question",
        "name": "I do not trust my data to Schuly. What can I do?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Fair. Schuly is fully open source - the app, the backend, the plugins, the plugin SDK, and this website all live on GitHub at github.com/schulydev. You can read every line of code, audit what we do with your data, and self-host the backend if you want full control. The app can be pointed at your own backend instance; nothing has to go through ours."
        }
      },
      {
        "@type": "Question",
        "name": "Is Schuly open source? Can I contribute?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Yes. Every component - app, backend, plugins, plugin SDK, and this website - is on GitHub at github.com/schulydev. Issues with the bug or feature label are the easiest place to start."
        }
      }
    ]
  }
