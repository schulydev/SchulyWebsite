  <!-- Structured data: FAQ -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "FAQPage",
    "mainEntity": [
      {
        "@type": "Question",
        "name": "What is Schuly?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Schuly is a free, open-source student portal app. It gives you a modern interface for the school system your school already uses - grades, schedule, agenda, absences, push notifications. Available for iOS, Android, and Web."
        }
      },
      {
        "@type": "Question",
        "name": "Does Schuly work with Schulnetz?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Yes. Schulnetz is supported out of the box via the official Schulware plugin: grades, agenda, absences, exams, push notifications. Schulnetz is currently the most widely used integration."
        }
      },
      {
        "@type": "Question",
        "name": "Is Schuly affiliated with Schulnetz or Centerboard AG?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "No. Schuly is an independent open-source project. It is not affiliated with, endorsed by, or sponsored by Centerboard AG or any other school system, company, or institution."
        }
      },
      {
        "@type": "Question",
        "name": "How much does Schuly cost?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Schuly is free. The app, the backend, and the plugin SDK are open source. Source code is on GitHub under github.com/schulydev."
        }
      },
      {
        "@type": "Question",
        "name": "Where is my data stored?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "The backend runs on IONOS in Germany. Your data stays in the EU/EEA - no third-country transfer. The marketing site is on Cloudflare Pages and processes only your IP for delivery."
        }
      },
      {
        "@type": "Question",
        "name": "Does Schuly know my school password?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "No. Authentication is delegated to your school's identity provider via OIDC. Schuly never sees or stores your password."
        }
      },
      {
        "@type": "Question",
        "name": "Can my school system be added?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "If your school system exposes an API and someone can write a backend plugin against the Schuly plugin SDK, yes. The app itself works with any system that has a plugin - you do not need to choose a plugin in the app."
        }
      },
      {
        "@type": "Question",
        "name": "Is Schuly open source? Can I contribute?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Yes. Every component - app, backend, plugins, plugin SDK, and this website - is on GitHub at github.com/schulydev. Issues with the bug or feature label are the easiest place to start."
        }
      }
    ]
  }
