name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'
categories:
  - title: 'Features'
    labels: ['feature', 'enhancement']
  - title: 'Bug fixes'
    labels: ['bug']
  - title: 'Refactor'
    labels: ['refactor']
  - title: 'Documentation'
    labels: ['documentation']
  - title: 'CI / build'
    labels: ['CI/CD', 'dependencies']
change-template: '- $TITLE (#$NUMBER) @$AUTHOR'
version-resolver:
  minor:
    labels: ['feature']
  default: patch
template: |
  ## What's changed

  $CHANGES
